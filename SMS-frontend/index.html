<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMC Attendance System | Login</title>
    <meta name="description"
        content="Villagers Montessori College – SMS Notification & Attendance System. Secure admin login.">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="login-bg" data-page="login">

    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">🎓</div>
            <h4>Villagers Montessori College</h4>
            <p class="login-subtitle">SMS Notification & Attendance System</p>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" class="form-control" placeholder="Enter your username"
                        autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password"
                        autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
                    🔐 Sign In
                </button>
            </form>

            <p style="text-align:center; margin-top: 20px; font-size: 0.75rem; color: var(--text-muted); line-height: 1.4;">
                Admin: admin / admin123 <br>
                Parent: Student ID / Contact No. (e.g., STU001 / 09171234567)
            </p>
        </div>
    </div>

    <script src="assets/js/script.js?v=2"></script>
</body>

</html>
