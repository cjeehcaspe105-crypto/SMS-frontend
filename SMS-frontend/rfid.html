<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Scanner | VMC Attendance System</title>
    <meta name="description"
        content="RFID Attendance Scanner – Tap student ID cards to record Time In and Time Out with automatic SMS notification.">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-page="rfid">

    <!-- Hidden input to capture keyboard-wedge RFID scanner -->
    <input type="text" id="rfidInput" class="rfid-hidden-input" autocomplete="off" autofocus>

    <div class="rfid-page" id="scanArea">
        <!-- Header -->
        <div class="rfid-header">
            <div class="brand">
                <div class="brand-icon">🎓</div>
                <span>VMC Attendance</span>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <span class="live-clock" id="liveClock" style="font-size: 1rem;">--:--:-- --</span>
                <a href="dashboard.html" class="btn btn-outline btn-sm">← Back to Dashboard</a>
            </div>
        </div>

        <!-- Scanner Area -->
        <div class="rfid-scanner-area">
            <div class="scan-ring">
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="scan-icon">📡</div>
            </div>
            <h2>Tap Student RFID Card</h2>
            <p class="scanner-subtitle">Place the ID card near the scanner to record attendance</p>
        </div>

        <!-- Scan Result (hidden by default, shown on scan) -->
        <div class="scan-result" id="scanResult"></div>

        <!-- Simulate Button -->
        <button class="btn btn-primary btn-lg" onclick="simulateRFIDScan()" style="margin-bottom: 40px;">
            🧪 Simulate RFID Tap (Demo)
        </button>

        <!-- Today's Scan Log -->
        <div class="rfid-log">
            <div class="glass-card">
                <div class="flex-between mb-2">
                    <h3 style="font-size: 1rem; font-weight: 700;">Today's Scan Log</h3>
                    <span class="badge badge-neutral" id="scanCount">0 scans</span>
                </div>
                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>RFID</th>
                                <th>Student Name</th>
                                <th>Grade</th>
                                <th>Time</th>
                                <th>Type</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="todayScansBody">
                            <tr>
                                <td colspan="6" class="text-center text-muted" style="padding:32px">
                                    No scans today. Tap an RFID card to begin.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/script.js?v=2"></script>
</body>

</html>
